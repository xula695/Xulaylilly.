<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بۆ تاقە تاقانەکەم ❤️</title>
    <style>
        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            direction: rtl;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 85%;
            animation: fadeIn 2s ease-in-out;
        }
        h1 { color: #ff4d6d; font-size: 28px; margin-bottom: 20px; }
        p { color: #4a4a4a; font-size: 18px; line-height: 1.8; margin: 10px 0; }
        .heart { 
            font-size: 60px; 
            color: #ff4d6d; 
            animation: beat 0.8s infinite alternate; 
            margin-bottom: 15px;
        }
        @keyframes beat {
            to { transform: scale(1.25); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="heart">❤️</div>
    <h1>بۆ ئامێزی ئارامیم...</h1>
    <p>تۆ جوانترین و پڕ بەهاترین دیاری چاره‌نووسیت لە ژیانی مندا.</p>
    <p>هەرگیز لە بیرت نەچێت کە چەندە خۆشم دەوێیت! ✨</p>
</div>

</body>
</html>
