<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بۆ تاقە تاقانەکەم ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0b0105;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        /* کینڤاس بۆ بارانی نووسین و گوڵەکان */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* کارتە ڕۆمانسییەکەی ناوەڕاست */
        .love-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 230, 238, 0.85);
            backdrop-filter: blur(8px);
            padding: 40px 30px;
            border-radius: 25px;
            border: 2px solid #ff4d6d;
            box-shadow: 0px 0px 25px rgba(255, 77, 109, 0.4);
            text-align: center;
            max-width: 450px;
            width: 85%;
            direction: rtl;
            animation: float 4s ease-in-out infinite;
        }
        .heart-icon {
            font-size: 55px;
            color: #ff4d6d;
            margin-bottom: 15px;
            animation: pulse 1s infinite alternate;
        }
        h1 {
            color: #ff4d6d;
            font-size: 26px;
            margin-bottom: 15px;
        }
        p {
            color: #3a0ca3;
            font-size: 20px;
            line-height: 1.8;
            font-weight: bold;
        }
        /* ئەنیمەیشنی جوڵانی کارتەکە */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        /* ئەنیمەیشنی لێدانی دڵەکە */
        @keyframes pulse {
            to { transform: scale(1.15); }
        }
    </style>
</head>
<body>

    <canvas id="loveCanvas"></canvas>

    <div class="love-card">
        <div class="heart-icon">❤️</div>
        <h1>بۆ شاژنی دڵم...</h1>
        <p>«لەنێوان تەواوی دونیادا، دڵی من تۆی هەڵبژارد؛ لیلی تاقە دڵ و بەنرخترین دیاری ژیانی خولایە.» ✨</p>
    </div>

    <script>
        const canvas = document.getElementById('loveCanvas');
        const ctx = canvas.getContext('2d');

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const fontSize = 16;
